  <!-- Debug: visible error tracing for Vercel deployment -->
  <script>
    (function() {
      var logs = [];
      var panel = null;

      function createPanel() {
        if (panel) return;
        panel = document.createElement('div');
        panel.id = 'debugPanel';
        panel.setAttribute('style',
          'position:fixed;bottom:0;left:0;right:0;max-height:50vh;overflow-y:auto;' +
          'background:rgba(0,0,0,0.92);color:#0f0;font:12px/1.6 monospace;padding:12px 16px;z-index:99999;'
        );
        document.body.appendChild(panel);
      }

      function log(msg, color) {
        logs.push({ msg: msg, color: color || '#0f0' });
        if (!panel) createPanel();
        var line = document.createElement('div');
        line.setAttribute('style', 'color:' + (color || '#0f0'));
        line.textContent = msg;
        panel.appendChild(line);
        panel.scrollTop = panel.scrollHeight;
      }

      window.__debugLog = log;

      // Catch all unhandled errors
      window.addEventListener('error', function(e) {
        log('[ERROR] ' + e.message + ' | ' + (e.filename || '') + ':' + (e.lineno || ''), '#f44');
      });
      window.addEventListener('unhandledrejection', function(e) {
        log('[PROMISE REJECT] ' + (e.reason && e.reason.message || e.reason || 'unknown'), '#f44');
      });

      log('[DEBUG] Debug panel initialized');

      // After DOM is ready, run diagnostics
      document.addEventListener('DOMContentLoaded', function() {
        log('[DOM] DOMContentLoaded fired');

        // Check if web components registered
        var wcNames = ['app-avatar', 'app-chat-input', 'app-chat-status'];
        wcNames.forEach(function(name) {
          var defined = !!customElements.get(name);
          log('[WC] ' + name + ': ' + (defined ? 'REGISTERED' : 'NOT REGISTERED'), defined ? '#0f0' : '#f44');
        });

        // Check if key DOM elements exist
        var ids = ['loadingScreen', 'avatar', 'messageInput', 'sendBtn', 'loadingCounter'];
        ids.forEach(function(id) {
          var el = document.getElementById(id);
          log('[DOM] #' + id + ': ' + (el ? 'FOUND' : 'MISSING'), el ? '#0f0' : '#f44');
        });

        // Check innerHTML of web components
        var appAvatar = document.querySelector('app-avatar');
        var appInput = document.querySelector('app-chat-input');
        log('[DOM] app-avatar innerHTML length: ' + (appAvatar ? appAvatar.innerHTML.length : 'element missing'),
            appAvatar && appAvatar.innerHTML.length > 10 ? '#0f0' : '#f44');
        log('[DOM] app-chat-input innerHTML length: ' + (appInput ? appInput.innerHTML.length : 'element missing'),
            appInput && appInput.innerHTML.length > 10 ? '#0f0' : '#f44');

        // Probe key URLs for 404s
        var urls = [
          '/web-components/app-avatar.js',
          '/web-components/app-chat-input.js',
          '/js/app.js',
          '/styles/main.css',
          '/api/config',
          '/api/health'
        ];
        urls.forEach(function(url) {
          fetch(url, { method: 'HEAD' }).then(function(r) {
            log('[FETCH] ' + url + ' -> ' + r.status, r.ok ? '#0f0' : '#f44');
          }).catch(function(err) {
            log('[FETCH] ' + url + ' -> FAILED: ' + err.message, '#f44');
          });
        });
      });

      // After a delay, check if app initialized
      setTimeout(function() {
        log('[CHECK] window.chatManager: ' + (window.chatManager ? 'EXISTS' : 'MISSING'),
            window.chatManager ? '#0f0' : '#ff0');
        log('[CHECK] window.ttsManager: ' + (window.ttsManager ? 'EXISTS' : 'MISSING'),
            window.ttsManager ? '#0f0' : '#ff0');
        var ls = document.getElementById('loadingScreen');
        if (ls) {
          log('[CHECK] loadingScreen display: ' + getComputedStyle(ls).display +
              ' | opacity: ' + getComputedStyle(ls).opacity +
              ' | hidden class: ' + ls.classList.contains('hidden'));
        }
      }, 6000);
    })();
  </script>
