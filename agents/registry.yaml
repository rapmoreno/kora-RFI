version: 1
agents:
  - id: sentiment
    name: Sentiment Analysis Agent
    version: 0.1.0
    enabled: true
    provider: openrouter
    model: meta-llama/llama-3.3-70b-instruct
    description: Analyzes sentiment of user messages before routing
    tags: [analysis, sentiment, routing]
    prompt_file: prompts/synapse/emotional-state-engine-prompts/sentiment_agent.md
    output_schema: schemas/sentiment_output.schema.json
    params:
      temperature: 0
      max_tokens: 300
      hardware_provider: groq
    guardrails:
      - output_json_only
    skip_personality: true

  - id: normal
    name: Normal Agent
    version: 0.1.0
    enabled: true
    provider: openrouter
    model: meta-llama/llama-3.3-70b-instruct
    description: Balanced, professional responses for neutral emotions
    tags: [conversational, neutral]
    prompt_file: prompts/synapse/emotional-state-engine-prompts/normal_agent.md
    output_schema: schemas/conversation_output.schema.json
    params:
      temperature: 0.7
      max_tokens: 1500
      hardware_provider: groq
    guardrails: []

